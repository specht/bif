<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Interaktives Abenteuer</title>
        <script src="/lib/js-yaml.min.js"></script>
        <script src="/lib/lz-string.min.js"></script>
        <script src="/lib/story-metadata.js"></script>

        <script>
            const ts = Date.now();
            const style = document.createElement('link');
            style.rel = 'stylesheet';
            style.href = `/styles.css?v=${ts}`;
            document.head.appendChild(style);
        </script>

        <link rel="stylesheet" href="/fonts/fonts.css">
    </head>
    <body>
        <div id="resizable-children">
            <div id="dev_pane">
                <div id="dev_fixed">
                    <div id="graph-container"></div>
                    <div id="divider"></div>
                    <div id="state-container"></div>
                </div>
            </div>
            <div id="game_pane">
                <div id="content">
                </div>
                <div id="story-status" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
            </div>
        </div>
        <nav style="display: none;">
            <button id="bu_reset_game" class="story-restart icon-text"><svg class="icon" aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-refresh"></use></svg><span class="icon-label">Spiel neu starten</span></button>
        </nav>
        <script type="module">
            import(`/lib/script.js?v=${ts}`).then(mod => mod.init());
        </script>
    </body>
</html>
